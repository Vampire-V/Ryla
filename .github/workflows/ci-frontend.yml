name: CI — Frontend (Next.js)

on:
  push:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-frontend.yml'
  pull_request:
    branches: [main, develop]
    # ไม่ใส่ path filter — ให้ run ทุก PR เพื่อ branch protection required checks

permissions:
  contents: read
  pull-requests: write

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: Static Analysis
  # Quality Gate: ESLint errors or warnings → fail
  # Quality Gate: TypeScript errors → fail
  # ─────────────────────────────────────────────────────────────
  lint:
    name: Static Analysis
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint — zero-warning gate
        run: pnpm lint
        # --max-warnings 0 อยู่ใน package.json script แล้ว

      - name: TypeScript — type check
        run: pnpm type-check

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Test + Coverage Gate
  # Quality Gate: line coverage < 80% → fail
  # ─────────────────────────────────────────────────────────────
  test:
    name: Test & Coverage Gate
    runs-on: ubuntu-latest
    needs: lint

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Vitest with coverage
        run: pnpm test:coverage
        # vitest outputs coverage/coverage-summary.json (json-summary reporter)

      - name: Quality Gate — enforce 80% line coverage
        run: |
          node - <<'EOF'
          const fs = require('fs');
          const summaryPath = './coverage/coverage-summary.json';

          if (!fs.existsSync(summaryPath)) {
            // No tests yet — warn but don't fail during bootstrap phase
            console.log('Warning: No coverage summary found. Add tests to enforce gate.');
            process.exit(0);
          }

          const summary = JSON.parse(fs.readFileSync(summaryPath, 'utf8'));
          const pct = summary.total?.lines?.pct ?? 0;
          const threshold = 80;

          console.log('Line coverage : ' + pct + '%');
          console.log('Threshold     : ' + threshold + '%');

          if (pct < threshold) {
            console.error('QUALITY GATE FAILED: ' + pct + '% < ' + threshold + '%');
            console.error('Coverage must be >= 80% before merging.');
            process.exit(1);
          }

          console.log('QUALITY GATE PASSED: ' + pct + '% >= ' + threshold + '%');
          EOF

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-frontend
          path: frontend/coverage/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # JOB 3: Production Build (Global Edge)
  # Ensures Next.js builds cleanly for Vercel/Cloudflare deployment
  # ─────────────────────────────────────────────────────────────
  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: test

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Next.js production build
        run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: frontend/.next/
          retention-days: 3
