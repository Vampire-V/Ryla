name: Quality Gate

# This is the SINGLE required status check configured in branch protection.
# It depends on all CI jobs and only succeeds when everything passes.
# Configure GitHub branch protection to require: "Quality Gate / All Checks Passed"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB: Changelog Fragment Check
  #
  # ทุก PR ต้องมี changelog fragment ใน changelog/fragments/
  # ยกเว้น PR ที่มี label: skip-changelog, dependencies, release
  # ─────────────────────────────────────────────────────────────
  changelog-fragment:
    name: Changelog Fragment
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Check changelog fragment
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          # Bypass labels — PRs ที่ไม่ต้องการ changelog
          SKIP_LABELS=("skip-changelog" "dependencies" "release" "chore: deps" "ci")
          for LABEL in "${SKIP_LABELS[@]}"; do
            if echo "$PR_LABELS" | grep -q "\"$LABEL\""; then
              echo "✅ Bypass label '${LABEL}' detected — changelog fragment not required"
              exit 0
            fi
          done

          # ตรวจหา fragment
          FRAGMENT=$(ls "changelog/fragments/${PR_NUMBER}-"*.yml 2>/dev/null | head -1 || echo '')
          if [ -z "$FRAGMENT" ]; then
            echo "❌ ไม่พบ changelog fragment สำหรับ PR #${PR_NUMBER}"
            echo ""
            echo "สร้าง fragment ด้วย: make changelog-add"
            echo "หรือ เพิ่ม label 'skip-changelog' ถ้าไม่มี user-facing change"
            exit 1
          fi

          # Validate fragment schema
          echo "✅ Found fragment: $FRAGMENT"
          python3 -c "
          import yaml, sys
          with open('$FRAGMENT') as f:
              data = yaml.safe_load(f)
          required = ['pr', 'type', 'scope', 'title', 'breaking', 'migration']
          missing = [k for k in required if k not in data]
          if missing:
              print(f'❌ Fragment missing fields: {missing}')
              sys.exit(1)
          valid_types = ['feat', 'fix', 'perf', 'refactor', 'security', 'docs', 'chore']
          if data['type'] not in valid_types:
              print(f'❌ Invalid type: {data[\"type\"]} — must be one of {valid_types}')
              sys.exit(1)
          if len(data['title']) > 80:
              print(f'❌ Title too long: {len(data[\"title\"])} chars (max 80)')
              sys.exit(1)
          print(f'✅ Fragment valid: [{data[\"type\"]}] {data[\"title\"]}')
          "

      - name: Check migration flag
        if: always()
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          # ตรวจว่ามี migration ใหม่แต่ fragment ไม่ได้ set migration: true
          NEW_MIGRATIONS=$(git diff --name-only --diff-filter=A origin/${{ github.base_ref }}...HEAD \
            -- 'supabase/migrations/*.sql' 2>/dev/null || echo '')

          if [ -z "$NEW_MIGRATIONS" ]; then
            echo "✅ No new migrations — migration flag not required"
            exit 0
          fi

          echo "🔍 New migrations detected:"
          echo "$NEW_MIGRATIONS"

          FRAGMENT=$(ls "changelog/fragments/${PR_NUMBER}-"*.yml 2>/dev/null | head -1 || echo '')
          if [ -z "$FRAGMENT" ]; then
            echo "⚠️  New migrations found but no fragment — create one with make changelog-add"
            exit 0
          fi

          python3 -c "
          import yaml, sys
          with open('$FRAGMENT') as f:
              data = yaml.safe_load(f)
          if not data.get('migration', False):
              print('❌ PR has new Supabase migrations but fragment has migration: false')
              print('   Update fragment: migration: true')
              sys.exit(1)
          print('✅ Migration flag correctly set')
          "

  # ─────────────────────────────────────────────────────────────
  # JOB: All Checks Must Pass
  #
  # ใช้ GitHub Checks API poll สถานะ check runs จาก CI workflows อื่นๆ
  # เพราะ `needs:` ไม่สามารถ cross-reference ข้าม workflow files ได้
  #
  # Branch protection setting (เมื่อ upgrade เป็น Pro):
  #   Required status checks → "Quality Gate / All Checks Passed"
  # ─────────────────────────────────────────────────────────────
  all-checks-passed:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [changelog-fragment]
    if: always()

    steps:
      - name: Wait for all CI checks to complete
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ github.event.pull_request.head.sha || github.sha }}"
          REPO="${{ github.repository }}"
          SELF_NAME="All Checks Passed"
          MAX_ATTEMPTS=20   # 20 × 30s = 10 นาที max
          SLEEP_SEC=30

          echo "🔍 Waiting for check runs on $SHA..."
          echo ""

          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            # ดึง check runs ทั้งหมด ยกเว้นตัวเอง
            PENDING=$(gh api "repos/$REPO/commits/$SHA/check-runs" \
              --paginate \
              --jq "[.check_runs[] | select(.name != \"$SELF_NAME\" and .status != \"completed\")] | length")

            if [ "$PENDING" = "0" ]; then
              echo "✅ All checks completed"
              break
            fi

            echo "⏳ $PENDING check(s) still running... (attempt $attempt/$MAX_ATTEMPTS)"
            sleep $SLEEP_SEC
          done

          if [ "$PENDING" != "0" ]; then
            echo "⚠️  Timed out waiting for checks to complete"
          fi

      - name: Verify all checks passed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ github.event.pull_request.head.sha || github.sha }}"
          REPO="${{ github.repository }}"
          SELF_NAME="All Checks Passed"

          echo "## Quality Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY

          # ดึงผลลัพธ์ทั้งหมด
          CHECKS=$(gh api "repos/$REPO/commits/$SHA/check-runs" \
            --paginate \
            --jq ".check_runs[] | select(.name != \"$SELF_NAME\") | \"\(.conclusion)\t\(.name)\"")

          FAILED=0
          while IFS=$'\t' read -r conclusion name; do
            [ -z "$name" ] && continue
            case "$conclusion" in
              success)
                echo "  ✅ $name"
                echo "| $name | ✅ pass |" >> $GITHUB_STEP_SUMMARY
                ;;
              skipped)
                echo "  ⏭️  $name (skipped)"
                echo "| $name | ⏭️ skipped |" >> $GITHUB_STEP_SUMMARY
                ;;
              failure)
                echo "  ❌ $name"
                echo "| $name | ❌ **FAIL** |" >> $GITHUB_STEP_SUMMARY
                FAILED=$((FAILED + 1))
                ;;
              *)
                echo "  ⚠️  $name ($conclusion)"
                echo "| $name | ⚠️ $conclusion |" >> $GITHUB_STEP_SUMMARY
                ;;
            esac
          done <<< "$CHECKS"

          # Changelog fragment check (from this workflow)
          CL_RESULT="${{ needs.changelog-fragment.result }}"
          if [ "$CL_RESULT" = "failure" ]; then
            echo "  ❌ Changelog Fragment"
            echo "| Changelog Fragment | ❌ **FAIL** |" >> $GITHUB_STEP_SUMMARY
            FAILED=$((FAILED + 1))
          elif [ "$CL_RESULT" = "success" ]; then
            echo "  ✅ Changelog Fragment"
            echo "| Changelog Fragment | ✅ pass |" >> $GITHUB_STEP_SUMMARY
          fi

          echo ""
          if [ "$FAILED" -gt 0 ]; then
            echo "❌ QUALITY GATE FAILED — $FAILED check(s) failed"
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**❌ QUALITY GATE FAILED** — $FAILED check(s) failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "✅ QUALITY GATE PASSED — all checks green"
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**✅ QUALITY GATE PASSED**" >> $GITHUB_STEP_SUMMARY
